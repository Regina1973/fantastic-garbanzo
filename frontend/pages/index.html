<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sabor & Cia</title>

    <link rel="stylesheet"
          href="../public/css/style.css">

</head>

<body>


    <!-- NAVBAR -->
    <header class="navbar">

        <div class="logo">
            🍔 Sabor & Cia
        </div>

        <nav>

            <a href="#">Home</a>
            <a href="#">Cardápio</a>
            <a href="#">Promoções</a>
            <a href="#">Contato</a>

        </nav>

        <button class="btn-login">
            Entrar
        </button>

    </header>


    <!-- HERO -->
    <section class="hero">

        <div class="hero-text">

            <h1>
                Hambúrguer Artesanal
            </h1>

            <p>
                Os melhores lanches da cidade.
            </p>

            <button class="btn-primary">
                Ver Cardápio
            </button>

        </div>


        <div class="hero-image">

            <img
                src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd"
                alt="Hamburguer">

        </div>

    </section>


    <!-- PRODUTOS -->
    <section class="produtos">

        <h2>Destaques</h2>

        <div class="cards">


            <div class="card">

                <img
                    src="https://images.unsplash.com/photo-1550547660-d9450f859349"
                    alt="Burger">

                <h3>X-Burger</h3>

                <p>R$ 29,90</p>

                <button>
                    Adicionar
                </button>

            </div>


            <div class="card">

                <img
                    src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38"
                    alt="Pizza">

                <h3>Pizza Especial</h3>

                <p>R$ 49,90</p>

                <button>
                    Adicionar
                </button>

            </div>

        </div>

    </section>


    <!-- FOOTER -->
    <footer>

        <p>
            © 2026 Sabor & Cia
        </p>

    </footer>


    <script src="../public/js/app.js"></script>

</body>

</html>
